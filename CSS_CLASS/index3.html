<!DOCTYPE html>
<html>
<head>
  <title>Flexbox Demo</title>
  <style>
    .container {
      height: 100vh;
      display: flex;
      flex-direction: column-reverse; /* try row, row-reverse, column */
      justify-content: flex-end;      /* options: flex-start, center, space-between, space-evenly */
      align-items: flex-start;        /* options: flex-start, center, flex-end */
      gap: 10px;
    }

    /* start, end, center, space-between, space-evenly, space-around */
    .box {
      width: 300px;
      height: 100px;
      border: 1px solid black;
      margin-right: 15px;
      text-align: center;
      line-height: 100px;
      font-weight: bold;
      background-color: lightblue;
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="box">1</div>
    <div class="box">2</div>
    <div class="box">3</div>
    <div class="box">4</div>
  </div>
</body>
</html>
