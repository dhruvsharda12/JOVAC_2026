<!DOCTYPE html>
<html>
<head>
    <title>css </title>
    
    <p style="color: blue;">
    This is a paragraph with inline CSS.</p>
    

    <h1>This is heading 1</h1>
    <style>
        h1{
            color:green;
            
        }
        p{
            color:purple;
        }
        .blue{
            color:orange;
        }
        #para1{
            color:red;
        }
        #para2{
            color:blue;
        }
    </style>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <p style="font-size: 20px;">
    This is a paragraph with inline CSS.</p>

    <p class="blue">wow1</p>
    <p class="blue">wow2</p>
    <p class="blue">wow3</p>
    <p class="blue">wow4</p>
    <p class="blue">wow5</p>
    <p id="para1">wow6</p>
    <p id="para2">wow7</p>

    <div>
        width: 100px;
        height: 100px;
        background-color: red;  
        border: 2px solid black;
        box-shadow: 5px 5px 10px gray;
    </div>
</body>
</html>
