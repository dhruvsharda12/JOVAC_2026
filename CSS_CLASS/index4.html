<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Document</title>
  <style>
    .navContainer {
      display: flex;
      margin-left: 20px;
      margin-right: 20px;
      justify-content: space-between;
      align-items: center;
      height: 74px;
    }

    .left {
      display: flex;
      gap: 10px;
      align-items: center;
    }

    .logo img {
      height: 40px;
    }

    .navMenu {
      display: flex;
      gap: 20px;
    }

    .navMenu p {
      margin: 0;
      cursor: pointer;
    }

    .right {
      display: flex;
      gap: 15px;
      align-items: center;
    }

    .loginButton {
      border: 1px solid blue;
      padding: 10px;
      color: blue;
      border-radius: 10px;
      cursor: pointer;
    }

    .signupButton {
      border: 1px solid blue;
      padding: 10px;
      color: white;
      background-color: blue;
      border-radius: 10px;
      cursor: pointer;
    }
  </style>
</head>
<body>
  <nav class="navContainer">
    <div class="left">
      <div class="logo">
        <img src="https://uxwing.com/wp-content/themes/uxwing/download/brands-and-social-media/razorpay-icon.png" alt="logo">
      </div>
      <div class="navMenu">
        <p>Appetic Stack</p>
        <p>Payments</p>
        <p>Banking+</p>
        <p>Payroll</p>
        <p>Lineage</p>
        <p>Partners</p>
        <p>Resources</p>
        <p>Pricing</p>
      </div>
    </div>
    <div class="right">
      <div class="headPhoneIcon">🎧</div>
      <div class="indiaFlag">🇮🇳</div>
      <div class="loginButton">Log In</div>
      <div class="signupButton">Sign Up</div>
    </div>
  </nav>
</body>
</html>
